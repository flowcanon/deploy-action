name: Deploy
description: Discover hosts from compose config and deploy via SSH

inputs:
  tag:
    description: Image tag to deploy
    required: true
  ssh-key:
    description: SSH private key for deploy user
    required: true
  command:
    description: Compose command (script/prod or script/dev)
    default: script/prod
  host:
    description: Override deploy host (e.g. from vars.HOST_NAME)
    default: ""
  user:
    description: Override deploy user (e.g. from vars.HOST_USER)
    default: ""
  ssh-port:
    description: Override SSH port (e.g. from vars.SSH_PORT)
    default: ""
  registry-token:
    description: Token for GHCR authentication on deploy host
    default: ""
  upgrade:
    description: Upgrade flow-deploy on each host if behind the latest release
    default: "false"
  version:
    description: flow-deploy version (tag) to install — "latest" or "vX.Y.Z"
    default: latest

runs:
  using: composite
  steps:
    - name: Install flow-deploy
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        if [ "$VERSION" = "latest" ]; then
          url="https://github.com/flowcanon/deploy/releases/latest/download/flow-deploy-linux-glibc"
        else
          url="https://github.com/flowcanon/deploy/releases/download/${VERSION}/flow-deploy-linux-glibc"
        fi
        curl -fsSL -o /usr/local/bin/flow-deploy "$url"
        chmod +x /usr/local/bin/flow-deploy
        flow-deploy --version

    - name: Setup SSH agent
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ inputs.ssh-key }}

    - name: Discover hosts
      id: discover
      shell: bash
      env:
        HOST_NAME: ${{ inputs.host }}
        HOST_USER: ${{ inputs.user }}
        SSH_PORT: ${{ inputs.ssh-port }}
        COMPOSE_COMMAND: ${{ inputs.command }}
      run: |
        touch .env
        hosts=$(flow-deploy config)
        echo "hosts=$hosts" >> "$GITHUB_OUTPUT"

    - name: Upgrade flow-deploy on hosts
      if: inputs.upgrade == 'true'
      shell: bash
      env:
        HOSTS_JSON: ${{ steps.discover.outputs.hosts }}
        SSH_PORT_INPUT: ${{ inputs.ssh-port }}
      run: |
        upgraded=()
        echo "$HOSTS_JSON" | jq -c '.[]' | while read -r group; do
          host=$(echo "$group" | jq -r '.host')
          user=$(echo "$group" | jq -r '.user')
          port=$(echo "$group" | jq -r '.port // empty')
          port="${port:-$SSH_PORT_INPUT}"
          host_key="$user@$host"

          port_args=()
          if [ -n "$port" ]; then
            port_args=(-p "$port")
          fi

          for seen in "${upgraded[@]}"; do
            [ "$seen" = "$host_key" ] && continue 2
          done
          upgraded+=("$host_key")

          echo "::group::Upgrade $host_key"
          ssh -o StrictHostKeyChecking=no "${port_args[@]}" "$host_key" "flow-deploy upgrade"
          echo "::endgroup::"
        done

    - name: Deploy to hosts
      shell: bash
      env:
        DEPLOY_TAG: ${{ inputs.tag }}
        HOSTS_JSON: ${{ steps.discover.outputs.hosts }}
        SSH_PORT_INPUT: ${{ inputs.ssh-port }}
        REGISTRY_TOKEN: ${{ inputs.registry-token }}
      run: |
        echo "$HOSTS_JSON" | jq -c '.[]' | while read -r group; do
          host=$(echo "$group" | jq -r '.host')
          user=$(echo "$group" | jq -r '.user')
          dir=$(echo "$group" | jq -r '.dir')
          port=$(echo "$group" | jq -r '.port // empty')
          port="${port:-$SSH_PORT_INPUT}"

          port_args=()
          if [ -n "$port" ]; then
            port_args=(-p "$port")
          fi

          echo "::group::Deploy to $user@$host:$dir"

          if [ -n "$REGISTRY_TOKEN" ]; then
            echo "$REGISTRY_TOKEN" | ssh -o StrictHostKeyChecking=no "${port_args[@]}" "$user@$host" \
              "docker login ghcr.io -u ${{ github.actor }} --password-stdin 2>/dev/null"
          fi

          ssh -o StrictHostKeyChecking=no "${port_args[@]}" "$user@$host" \
            "cd $dir && git pull --ff-only || { echo 'Deploy aborted: could not fast-forward. Check for local changes or diverged history on the server.'; exit 1; } && flow-deploy deploy --tag $DEPLOY_TAG"

          if [ -n "$REGISTRY_TOKEN" ]; then
            ssh -o StrictHostKeyChecking=no "${port_args[@]}" "$user@$host" \
              "docker logout ghcr.io 2>/dev/null"
          fi
          echo "::endgroup::"
        done
